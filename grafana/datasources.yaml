apiVersion: 1

datasources:
  - name: influxdb
    type: influxdb
    url: http://localhost:8086
    isDefault: true
    access: proxy
    jsonData:
      defaultBucket: iptv_metrics
      organization: homebridge
      version: Flux
      httpMode: POST
    secureJsonData:
      token: REPLACE_WITH_INFLUXDB_TOKEN

  - name: prometheus
    type: prometheus
    url: http://localhost:9090
    access: proxy

  - name: loki
    type: loki
    url: http://localhost:30811
    access: proxy

  - name: Tempo
    type: tempo
    url: http://localhost:30845
    access: proxy

  - name: Thanos
    type: prometheus
    url: http://localhost:19193
    access: proxy
