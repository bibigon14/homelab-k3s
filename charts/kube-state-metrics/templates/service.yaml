apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: kube-state-metrics
spec:
  type: NodePort
  ports:
    - name: http-metrics
      port: {{ .Values.service.port }}
      targetPort: 8080
      nodePort: 30809
  selector:
    app: kube-state-metrics
