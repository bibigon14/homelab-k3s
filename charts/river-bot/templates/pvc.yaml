apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "river-bot.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "river-bot.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  storageClassName: {{ .Values.persistence.storageClassName }}
