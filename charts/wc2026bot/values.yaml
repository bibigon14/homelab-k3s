image:
  repository: wc2026-telegram-bot
  tag: latest
  pullPolicy: Never

redis:
  host: redis
  port: 6379

persistence:
  size: 64Mi
  storageClassName: local-path

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "300m"

env:
  BOT_TOKEN: ""
  CHAT_ID: ""
  CHECK_INTERVAL: ""
  FOOTBALL_API_KEY: ""
  LANG_BOT: ""
  SEND_TIME: ""
