apiVersion: v1
kind: Service
metadata:
  name: {{ include "wc2026bot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wc2026bot.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    {{- include "wc2026bot.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: 9120
      targetPort: metrics
      nodePort: 30120
      protocol: TCP
