replicaCount: 1

# Container timezone — affects log timestamps and any
# time-of-day logic that does not pass an explicit tz.
timezone: "America/Los_Angeles"

image:
  repository: alertmanager-telegram-bridge
  tag: latest
  pullPolicy: Never

service:
  type: NodePort
  port: 9119
  nodePort: 30119

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

config:
  server:
    host: "0.0.0.0"
    port: 9119
  telegram:
    token: ""          # override in values.secret.yaml
    default_chat_id: ""
  throttle:
    repeat_interval: 300
  quiet_hours:
    enabled: true
    start: "23:00"
    end: "07:00"
    timezone: "America/Los_Angeles"
  routes:
    - match:
        severity: critical
      chat_id: ""      # override in values.secret.yaml
      continue: false
    - match:
        severity: warning
      chat_id: ""
      continue: false
