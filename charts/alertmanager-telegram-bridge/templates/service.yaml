apiVersion: v1
kind: Service
metadata:
  name: {{ include "alertmanager-telegram-bridge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alertmanager-telegram-bridge.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "alertmanager-telegram-bridge.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      nodePort: {{ .Values.service.nodePort }}
