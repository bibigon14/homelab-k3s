image:
  repository: iptv-traceroute-analyzer
  tag: latest
  pullPolicy: Never

redis:
  host: redis
  port: 6379

timezone: "America/Los_Angeles"

schedules:
  influxWriter: "*/30 * * * *"
  notify: "15,45 7-23 * * *"
  autoSwitch: "0 * * * *"

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "500m"

env:
  CBILLING_PACKAGE: ""
  CBILLING_PASS: ""
  CBILLING_SESSION: ""
  CBILLING_USER: ""
  INFLUX_BUCKET: ""
  INFLUX_ORG: ""
  INFLUX_TOKEN: ""
  INFLUX_URL: ""
  TELEGRAM_CHAT_ID: ""
  TELEGRAM_TOKEN: ""

backoffLimit: 2

bot:
  image:
    repository: iptv-traceroute-analyzer
    tag: latest
    pullPolicy: Never
  resources:
    requests:
      memory: "64Mi"
      cpu: "10m"
    limits:
      memory: "128Mi"
      cpu: "100m"
