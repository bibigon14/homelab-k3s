apiVersion: v1
data:
  Corefile: |-
    homelab.local {
        errors
        cache 30
        forward . 192.168.50.212
    }
    .:53 {
        errors
        health
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
        }
        hosts /etc/coredns/NodeHosts {
          ttl 60
          reload 15s
          fallthrough
        }
        prometheus :9153
        cache 30
        loop
        reload
        loadbalance
        import /etc/coredns/custom/*.override
        forward . 192.168.50.212 1.1.1.1
    }
  NodeHosts: |
    192.168.50.212 homebridge
